<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro</title>
    <style>
        /* Separamos los elementos para que no se vean amontonados */
        .campo {
            margin-bottom: 15px; 
        }
        label {
            display: inline-block;
            width: 130px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <form> 
        <div class="campo">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" 
                   pattern="[A-Za-zñÑáéíóúÁÉÍÓÚ\s]+" 
                   placeholder="Solo escriba su nombre" required>
        </div>

        <div class="campo">
            <label for="apellido">Apellido:</label>
            <input type="text" id="apellido" name="apellido" 
                   pattern="[A-Za-zñÑáéíóúÁÉÍÓÚ\s]+" 
                   placeholder="Solo escriba su apellido" required>
        </div>

        <div class="campo">
            <label for="celular">Número celular:</label>
            <input type="tel" id="celular" name="celular" 
                   pattern="\[0-9]{10}" 
                   title="Deben ser exactamente 10 números"
                   placeholder="Solo 10 dígitos" required>
        </div>

        <div class="campo">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" 
                   placeholder="ejemplo@correo.com" required>
        </div>

        <div class="campo">
            <label for="genero">Género:</label>
            <select id="genero" name="genero">
                <option value="femenino">Femenino</option>
                <option value="masculino">Masculino</option>
                <option value="otro">Otro</option>
            </select>
        </div>
      
        <div class="campo">
            <h3>Fecha de nacimiento</h3>
            <input type="date" id="fecha" name="fecha" required>
        </div>

        <button type="submit" class="btnSucess" onclick="if(this.form.checkValidity()) alert('Su formulario fue correcto')">
            Enviar
        </button>
    </form>
    
</body>
</html>
